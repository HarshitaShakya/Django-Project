{% extends 'base.html' %}
{% block body %}

<h1> This is a Home Page</h1>
<table>
    <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Contact</th>
        </tr>
    </thead>
    <tbody>

{% for item in all %}
    <tr>
        <td>{{ item.fname }}</td>
        <td>{{ item.lname }}</td>
        <td>{{ item.email }}</td>
        <td>{{ item.contact }}</td>
    </tr>
{% empty %}
    <tr>
        <td colspan="4">No members found.</td>
    </tr>
{% endfor %}
    </tbody>
</table>
{% endblock %}
