{% extends 'base.html' %}
{% block body %}
<div class="container mt-4">
    <h1>{{ action }} Member</h1>

    <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
            <label for="fname">First name</label>
            <input id="fname" name="fname" class="form-control" required value="{{ member.fname|default:'' }}">
        </div>
        <div class="form-group">
            <label for="lname">Last name</label>
            <input id="lname" name="lname" class="form-control" required value="{{ member.lname|default:'' }}">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" class="form-control" required value="{{ member.email|default:'' }}">
        </div>
        <div class="form-group">
            <label for="contact">Contact</label>
            <input id="contact" name="contact" class="form-control" required value="{{ member.contact|default:'' }}">
        </div>

        <button class="btn btn-primary">{{ action }}</button>
        <a class="btn btn-secondary" href="{% url 'home' %}">Cancel</a>
    </form>
</div>
{% endblock %}
